enable-module-update = false
parallel-jobs = 2

# Only Morphe patches, APK-only builds (no Magisk modules)
# YouTube/Music/Reddit use MorpheApp/morphe-patches
# All other apps use hoo-dles/morphe-patches

[YouTube-Morphe]
app-name = "YouTube"
patches-source = "MorpheApp/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "apk"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"
